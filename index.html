<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title> 夢 唏 S t o r y 官 網 </title>

<style>

/* ================= BASE ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Microsoft JhengHei";
    background:#f7f7fb;
    color:#333;
}

/* ================= NAV ================= */
.nav{
    background:rgba(255,255,255,0.88);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    position:sticky;
    top:0;
}

.nav a{
    text-decoration:none;
    color:#666;
    margin:0 25px;
    font-weight:600;
    transition:0.2s;
}

.nav a:hover{
    color:#ff6fa7;
}

/* ================= BANNER ================= */
.banner{
    height:380px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    /* 你的背景不動 */
    background:
       linear-gradient(
    rgba(0,0,0,0.25),
    rgba(0,0,0,0.25)
)
        url("https://dreamstory-113.github.io/dreamstory.github.io/maple-bg.webp");

    background-size:cover;
    background-position:center;
    position:relative;
    overflow:hidden;
}
.banner::before{
    content:"";
    position:absolute;

    width:700px;
    height:700px;

    background:
        radial-gradient(
            circle,
            rgba(255,182,193,0.25),
            transparent 70%
        );

    top:-300px;
    right:-200px;

    pointer-events:none;
}
/* ================= 🍁 楓葉粒子 ================= */
.particles{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
}

/* 楓葉 */
.particle{
    position:absolute;
    width:14px;
    height:14px;

    background:linear-gradient(45deg,#ff6b6b,#ff9f43);
    clip-path: polygon(
        50% 0%,
        60% 20%,
        80% 20%,
        65% 40%,
        80% 60%,
        55% 50%,
        50% 100%,
        45% 50%,
        20% 60%,
        35% 40%,
        20% 20%,
        40% 20%
    );

    opacity:0.8;
    animation: fall linear infinite;
}

/* 下落動畫 */
@keyframes fall{
    0%{
        transform: translateY(-10%) rotate(0deg);
        opacity:0;
    }
    10%{
        opacity:1;
    }
    100%{
        transform: translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

/* ================= 文字（保持原本） ================= */
.banner h1,
.banner p,
.banner .subtext{
    color:white;
    position:relative;
    z-index:2;
}

.banner h1{
    font-size:54px;

    text-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 20px rgba(255,182,193,0.8),
        0 0 40px rgba(255,182,193,0.5),
        0 3px 10px rgba(0,0,0,0.6);

    animation: logoGlow 3s ease-in-out infinite;
}

@keyframes logoGlow{
    0%,100%{
        filter:brightness(1);
    }
    50%{
        filter:brightness(1.15);
    }
}

.banner p{
    margin-top:10px;
    font-size:18px;
}

.banner .subtext{
    margin-top:10px;
    font-size:14px;
    opacity:0.9;
}

/* ================= BUTTON ================= */
.banner .btns{
    margin-top:22px;
    position:relative;
    z-index:2;
}

.banner .btns a{
    display:inline-block;
    text-decoration:none;

    padding:10px 22px;
    margin:0 8px;

    background:#ffffff;
    color:#ff6fa7;

    border:2px solid #ffd1e6;
    border-radius:25px;

    font-weight:bold;
    transition:0.25s;

    box-shadow:0 4px 12px rgba(255,110,160,0.15);
}

.banner .btns a:hover{
    background:#ff6fa7;
    color:white;
    transform:translateY(-2px);
}

/* ================= SECTION（完全不動） ================= */
.section{
    width:1000px;
    margin:auto;
    padding:40px 0;
}

.title{
    text-align:center;
    font-size:30px;
    color:#ff6fa7;
    margin-bottom:20px;

    position:relative;
}

.title::after{
    content:"";
    width:60px;
    height:3px;
    background:#ffd1e6;
    display:block;
    margin:10px auto 0;
    border-radius:10px;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tabs button{
    border:none;
    padding:8px 14px;

    background:#ffffff;
    color:#666;

    border:1px solid #ffd6e7;
    border-radius:20px;

    cursor:pointer;
    font-weight:600;

    transition:0.2s;
}

.tabs button:hover{
    background:#ff6fa7;
    color:white;
}

.news-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.news-item{
    background:rgba(255,255,255,0.75);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    padding:16px;

    border-radius:16px;

    border:1px solid rgba(255,255,255,0.5);

    box-shadow:
        0 8px 25px rgba(0,0,0,0.05),
        0 0 15px rgba(255,182,193,0.08);

    cursor:pointer;

    display:flex;
    justify-content:space-between;
    align-items:center;

    transition:0.25s;
}

.news-item:hover{
    transform:translateY(-3px);
    border-color:#ffb6d1;
    box-shadow:0 10px 25px rgba(255,110,160,0.15);
}

.title-text{
    font-weight:700;
    color:#333;
}

.date{
    font-size:12px;
    color:#999;
}

.tag{
    font-size:12px;
    padding:4px 10px;

    background:#ffe4ef;
    color:#ff6fa7;

    border-radius:20px;
    font-weight:600;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);

    display:none;
    justify-content:center;
    align-items:center;
}

.modal.active{
    display:flex;
}

.modal-box{
    width:520px;
    background:#ffffff;

    padding:25px;
    border-radius:15px;

    border:1px solid #ffd6e7;

    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.modal-box h2{
    color:#ff6fa7;
}

.modal-box p{
    margin-top:10px;
    color:#555;
    line-height:1.6;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    cursor:pointer;
    font-size:20px;
    color:#ff6fa7;
}

</style>
</head>

<body>
<audio id="bgm" loop>
    <source src="maple-login.mp3" type="audio/mpeg">
</audio>
<div class="nav">
    <a href="#">首頁</a>
    <a href="#">公告</a>
    <a href="#">下載</a>
    <a href="#">Discord</a>
</div>

<div class="banner">

    <!-- 🍁 楓葉層 -->
    <div class="particles" id="particles"></div>

    <h1>♡｡ﾟ 夢 唏 S t o r y ﾟ｡♡</h1>
    <p>夢 幻 × 長 期 × 穩 定 經 營 </p>

    <div class="subtext">
        經驗 1x ｜ 掉落 1x ｜ 楓幣 1x
    </div>

    <div class="btns">
    <a href="#">立即下載</a>
    <a href="#">加入Discord</a>
    <a href="javascript:void(0)" onclick="toggleBGM()">🎵 音樂開關</a>
</div>
</div>

<div class="section">
    <div class="title">♡｡ﾟ 最 新 消 息 公 告  ﾟ｡♡</div>

    <div class="tabs">
        <button onclick="filter('all')">全部公告</button>
        <button onclick="filter('update')">更新公告</button>
        <button onclick="filter('event')">活動公告</button>
        <button onclick="filter('important')">重大公告</button>
    </div>

    <div id="newsList" class="news-list"></div>
</div>

<div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-box">
        <div class="close" onclick="closeModal()">✖</div>
        <h2 id="title"></h2>
        <p id="content"></p>
    </div>
</div>

<script>

/* 🍁 楓葉生成 */
const container = document.getElementById("particles");

for(let i=0;i<20;i++){
    const leaf = document.createElement("div");
    leaf.className = "particle";
    leaf.style.left = Math.random()*100 + "%";
    leaf.style.animationDuration = (4 + Math.random()*6) + "s";
    leaf.style.opacity = Math.random();
    leaf.style.transform = `scale(${0.5 + Math.random()})`;
    container.appendChild(leaf);
}
    
/* 原本公告不動 */
const newsData = [
    {title:"職業平衡調整",type:"update",date:"2026-06-20",content:"修正技能傷害"},
    {title:"端午活動開放",type:"event",date:"2026-06-19",content:"掉落加倍"},
    {title:"商城更新",type:"update",date:"2026-06-18",content:"新增時裝"},
    {title:"緊急維護公告",type:"important",date:"2026-06-17",content:"22:00維護"}
];

function sortNews(d){return d.sort((a,b)=>new Date(b.date)-new Date(a.date));}

function renderNews(type="all"){
    const list=document.getElementById("newsList");
    list.innerHTML="";

    let data=sortNews([...newsData]);

    data.forEach(n=>{
        if(type!=="all" && n.type!==type) return;

        let tagText="";
        let tagColor="";

        switch(n.type){

            case "update":
                tagText="【更新公告】";
                tagColor="#4a90e2";
                break;

            case "event":
                tagText="【活動公告】";
                tagColor="#2ecc71";
                break;

            case "important":
                tagText="【重大公告】";
                tagColor="#e74c3c";
                break;

            default:
                tagText="【一般公告】";
                tagColor="#999999";
        }

        const item=document.createElement("div");
        item.className="news-item";

        item.innerHTML=`
            <div class="title-text">
                <strong>【${n.date}】</strong>
                <span style="color:${tagColor};font-weight:bold;">
                    ${tagText}
                </span>
                ${n.title}
            </div>
        `;

        item.onclick=()=>openModal(n.title,n.content);
        list.appendChild(item);
    });
}

function filter(t){renderNews(t);}
function openModal(t,c){
    document.getElementById("modal").classList.add("active");
    document.getElementById("title").innerText=t;
    document.getElementById("content").innerText=c;
}
function closeModal(e){
    if(!e || e.target.id==="modal"){
        document.getElementById("modal").classList.remove("active");
    }
}
function toggleBGM() {
    const bgm = document.getElementById("bgm");

    if (bgm.paused) {
        bgm.play();
    } else {
        bgm.pause();
    }
}
renderNews();
/* 🎵 BGM設定 */
const bgm = document.getElementById("bgm");
bgm.volume = 0.15;

/* 🎵 使用者首次點擊後播放 */
window.addEventListener("click", function () {
    bgm.play().catch(() => {});
}, { once: true });
</script>

</body>
</html>
